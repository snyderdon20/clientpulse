name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check token is set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: SUPABASE_ACCESS_TOKEN secret is not set."
            echo "Go to https://supabase.com/dashboard/account/tokens to create one,"
            echo "then add it at: Repo Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          echo "Token is set (length ${#SUPABASE_ACCESS_TOKEN})"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy vagaro-webhook
        run: supabase functions deploy vagaro-webhook --project-ref dewsznqxagzahtkpriuk --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy vagaro-sync
        run: supabase functions deploy vagaro-sync --project-ref dewsznqxagzahtkpriuk --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy merge-clients
        run: supabase functions deploy merge-clients --project-ref dewsznqxagzahtkpriuk --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy staff-invite
        run: supabase functions deploy staff-invite --project-ref dewsznqxagzahtkpriuk --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

