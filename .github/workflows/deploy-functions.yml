name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Deploys every folder under supabase/functions/ so new functions
      # are picked up automatically without editing this workflow.
      - name: Deploy all Edge Functions
        run: |
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --no-verify-jwt
            echo "::endgroup::"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
